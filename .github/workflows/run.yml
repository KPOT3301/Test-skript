name: VPN Key Checker

on:
  schedule:
    - cron: '0 3 * * *'   # каждый день в 03:00 UTC
  workflow_dispatch:        # ручной запуск из GitHub UI

jobs:
  check-keys:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # нужно для git push

    steps:
      # ── 1. Клонируем репозиторий ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Устанавливаем Python ───────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Устанавливаем зависимости ──────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. Скачиваем последний sing-box из GitHub Releases ────
      - name: Install sing-box
        run: |
          LATEST=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | grep '"tag_name"' | cut -d '"' -f 4)
          VERSION=${LATEST#v}
          URL="https://github.com/SagerNet/sing-box/releases/download/${LATEST}/sing-box-${VERSION}-linux-amd64.tar.gz"
          echo "Downloading sing-box ${LATEST} ..."
          curl -L "$URL" -o sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv "sing-box-${VERSION}-linux-amd64/sing-box" /usr/local/bin/sing-box
          sudo chmod +x /usr/local/bin/sing-box
          sing-box version

      # ── 5. Запускаем чекер ────────────────────────────────────
      - name: Run GENERATOR.py
        run: python GENERATOR.py

      # ── 6. Коммитим результаты обратно в репозиторий ─────────
      - name: Commit updated subscriptions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscription.txt subscription_base64.txt
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update subscriptions [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
