name: VPN Checker

on:
  workflow_dispatch:  # ручной запуск

jobs:
  run:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install sing-box
        run: |
          # Получаем последнюю версию sing-box
          VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | grep tag_name | cut -d '"' -f 4)
          echo "Latest sing-box version: $VERSION"

          # Скачиваем tar.gz актуальной версии
          wget https://github.com/SagerNet/sing-box/releases/download/${VERSION}/sing-box-linux-amd64.tar.gz

          # Распаковываем и перемещаем бинарник
          tar -xzf sing-box-linux-amd64.tar.gz
          sudo mv sing-box*/sing-box /usr/local/bin/
          sing-box -v

      - name: Run VPN checker
        run: python GENERATOR.py

      - name: Commit results
        run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com
          git add subscription.txt subscription_base64.txt
          git commit -m "Update subscriptions" || echo "Nothing to commit"
          git push
