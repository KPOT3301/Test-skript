name: Check Vless Servers

on:
  schedule:
    - cron: '0 19 * * *'   # 19:00 UTC = 00:00 Оренбург (UTC+5)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Download and install sing-box
        run: |
          set -e
          sudo apt-get update && sudo apt-get install -y jq
          
          # Получаем последнюю версию sing-box
          LATEST_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
            echo "Failed to get latest version"
            exit 1
          fi
          echo "Latest version: $LATEST_VERSION"
          
          # Пробуем скачать с 'v' в имени файла и без 'v'
          VERSION_NO_V=${LATEST_VERSION#v}
          FILE_NAMES=("sing-box-${LATEST_VERSION}-linux-amd64.tar.gz" "sing-box-${VERSION_NO_V}-linux-amd64.tar.gz")
          SUCCESS=false
          for FNAME in "${FILE_NAMES[@]}"; do
            DOWNLOAD_URL="https://github.com/SagerNet/sing-box/releases/download/${LATEST_VERSION}/${FNAME}"
            echo "Trying $DOWNLOAD_URL"
            if curl --head -s -f -o /dev/null "$DOWNLOAD_URL"; then
              echo "Downloading $DOWNLOAD_URL"
              curl -L -f -o sing-box.tar.gz "$DOWNLOAD_URL"
              SUCCESS=true
              break
            fi
          done
          
          if [ "$SUCCESS" != "true" ]; then
            echo "Could not download sing-box"
            exit 1
          fi
          
          # Распаковываем
          tar -xzf sing-box.tar.gz
          
          # Ищем бинарник
          BIN_PATH=$(find . -path "*/sing-box" -type f | head -n1)
          if [ -z "$BIN_PATH" ]; then
            echo "Binary not found after extraction"
            exit 1
          fi
          
          # Копируем в текущую директорию
          cp "$BIN_PATH" ./sing-box
          chmod +x ./sing-box
          ./sing-box version
          
          # Добавляем в PATH
          echo "$(pwd)" >> $GITHUB_PATH

      - name: Create sources.txt if not exists
        run: |
          if [ ! -f sources.txt ]; then
            echo "https://example.com/sub" > sources.txt
            echo "sources.txt created with placeholder. Please edit it."
          fi

      - name: Run GENERATOR.py
        run: python GENERATOR.py
        env:
          LOG_LEVEL: INFO   # можно изменить на DEBUG для отладки

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add subscription.txt subscription_base64.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update subscription files"
            git pull --rebase origin main
            git push
          fi
