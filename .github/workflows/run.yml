name: Check Vless Servers

on:
  schedule:
    - cron: '0 19 * * *'   # 19:00 UTC = 00:00 Оренбург (UTC+5)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install geoip2

      - name: Get latest sing-box URL
        id: get_version
        run: |
          # Пытаемся взять обычную сборку (без musl)
          LATEST_URL=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | \
            jq -r '.assets[] | select(.name | contains("linux-amd64") and (contains("musl") | not)) | .browser_download_url' | \
            head -n1)
          # Если не нашли — берём любую linux-amd64
          if [ -z "$LATEST_URL" ]; then
            LATEST_URL=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | \
              jq -r '.assets[] | select(.name | contains("linux-amd64")) | .browser_download_url' | \
              head -n1)
          fi
          echo "LATEST_URL=$LATEST_URL" >> $GITHUB_ENV

      - name: Download and install sing-box
        run: |
          wget -q "${{ env.LATEST_URL }}" -O sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          # Ищем исполняемый файл sing-box внутри распакованного архива
          find . -type f -name "sing-box" -exec mv {} ./sing-box-bin \;
          sudo mv ./sing-box-bin /usr/local/bin/sing-box
          sudo chmod +x /usr/local/bin/sing-box
          # Очистка
          rm -f sing-box.tar.gz
          rm -rf $(find . -maxdepth 1 -type d -name "sing-box-*" 2>/dev/null)

      - name: Run GENERATOR.py
        run: python GENERATOR.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add subscription.txt subscription_base64.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update subscription files"
            git pull --rebase origin main
            git push
          fi
