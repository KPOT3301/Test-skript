name: Check Vless Servers

on:
  schedule:
    - cron: '0 19 * * *'   # 19:00 UTC = 00:00 Екатеринбург/Оренбург (UTC+5)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'   # кэширование зависимостей pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
        # Убедитесь, что в requirements.txt есть: requests geoip2 urllib3

      - name: Cache GeoIP database
        id: cache-geoip
        uses: actions/cache@v4
        with:
          path: GeoLite2-City.mmdb
          key: geoip-db-${{ runner.os }}-${{ hashFiles('GENERATOR.py') }}
          restore-keys: |
            geoip-db-${{ runner.os }}-

      - name: Get latest sing-box URL
        id: singbox_url
        run: |
          LATEST_URL=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | \
            jq -r '.assets[] | select(.name | contains("linux-amd64") and (contains("musl") | not)) | .browser_download_url' | \
            head -n1)
          if [ -z "$LATEST_URL" ]; then
            LATEST_URL=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | \
              jq -r '.assets[] | select(.name | contains("linux-amd64")) | .browser_download_url' | \
              head -n1)
          fi
          echo "LATEST_URL=$LATEST_URL" >> $GITHUB_ENV
          echo "✅ Найден sing-box: $LATEST_URL"

      - name: Download and install sing-box
        run: |
          wget -q "${{ env.LATEST_URL }}" -O sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          BIN_PATH=$(find . -type f -name "sing-box" -print -quit)
          if [ -z "$BIN_PATH" ]; then
            echo "❌ Бинарник sing-box не найден"
            exit 1
          fi
          sudo mv "$BIN_PATH" /usr/local/bin/sing-box
          sudo chmod +x /usr/local/bin/sing-box
          /usr/local/bin/sing-box version
          rm -f sing-box.tar.gz
          rm -rf $(find . -maxdepth 1 -type d -name "sing-box-*" 2>/dev/null)

      - name: Run GENERATOR.py
        env:
          LOG_LEVEL: INFO   # можно DEBUG для детализации
        run: python GENERATOR.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add subscription.txt subscription_base64.txt
          if git diff --cached --quiet; then
            echo "Нет изменений для коммита"
          else
            git commit -m "Auto-update subscription files [$(date +'%Y-%m-%d %H:%M')]"
            git pull --rebase origin main
            git push
          fi
