name: VPN Checker

on:
  workflow_dispatch:  # ручной запуск

jobs:
  run:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install sing-box
        run: |
          wget https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-linux-amd64.tar.gz
          tar -xzf sing-box-linux-amd64.tar.gz
          sudo mv sing-box*/sing-box /usr/local/bin/

      - name: Run VPN checker
        run: python GENERATOR.py

      - name: Commit results
        run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com
          git add subscription.txt subscription_base64.txt
          git commit -m "Update subscriptions" || echo "Nothing to commit"
          git push
