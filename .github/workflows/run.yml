name: Check Vless Servers

on:
  schedule:
    - cron: '0 19 * * *'   # 19:00 UTC = 00:00 Оренбург (UTC+5)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Download and install sing-box
        run: |
          set -e
          sudo apt-get update && sudo apt-get install -y jq
          LATEST_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
            echo "Failed to get latest version"
            exit 1
          fi
          echo "Latest version: $LATEST_VERSION"
          FILE_NAME="sing-box-${LATEST_VERSION}-linux-amd64.tar.gz"
          DOWNLOAD_URL="https://github.com/SagerNet/sing-box/releases/download/${LATEST_VERSION}/${FILE_NAME}"
          echo "Downloading from $DOWNLOAD_URL"
          wget -q "$DOWNLOAD_URL" -O sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          find . -maxdepth 2 -name "sing-box" -type f -exec cp {} ./sing-box \;
          chmod +x ./sing-box
          ./sing-box version
          echo "$(pwd)" >> $GITHUB_PATH

      - name: Create sources.txt if not exists
        run: |
          if [ ! -f sources.txt ]; then
            echo "https://example.com/sub" > sources.txt
            echo "sources.txt created with placeholder. Please edit it."
          fi

      - name: Run GENERATOR.py
        run: python GENERATOR.py
        env:
          LOG_LEVEL: INFO

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add subscription.txt subscription_base64.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update subscription files"
            git pull --rebase origin main
            git push
          fi
