name: Check Vless Servers

on:
  schedule:
    - cron: '0 19 * * *'   # 19:00 UTC = 00:00 Оренбург (UTC+5)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Xray and GeoIP
        id: cache-xray-geoip
        uses: actions/cache@v4
        with:
          path: |
            xray-core
            GeoLite2-City.mmdb
          key: ${{ runner.os }}-xray-geoip-${{ hashFiles('GENERATOR.py') }}
          restore-keys: |
            ${{ runner.os }}-xray-geoip-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'          # автоматическое кэширование зависимостей pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # geoip2 уже должен быть в requirements.txt, иначе добавьте его туда

      - name: Download Xray-core (if not cached)
        if: steps.cache-xray-geoip.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray-core
          chmod +x xray-core/xray
          rm -f Xray-linux-64.zip

      - name: Add Xray to PATH
        run: echo "$(pwd)/xray-core" >> $GITHUB_PATH

      - name: Show versions
        run: |
          python --version
          xray --version || true

      - name: Run GENERATOR.py
        run: python GENERATOR.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add subscription.txt subscription_base64.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update subscription files"
            # Прямой push, так как эти файлы меняются только этим workflow
            git push origin HEAD:main
          fi
