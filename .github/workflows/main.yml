name: Check Vless Servers

on:
  schedule:
    - cron: '0 19 * * *'   # 19:00 UTC = 00:00 Оренбург (UTC+5)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # geoip2 уже должен быть в requirements.txt; если нет – раскомментируйте:
          # pip install geoip2

      - name: Download sing-box
        run: |
          VERSION="v1.10.0"
          ARCH="linux-amd64"
          FILE_VERSION=${VERSION#v}
          FILENAME="sing-box-${FILE_VERSION}-${ARCH}.tar.gz"
          wget -q "https://github.com/SagerNet/sing-box/releases/download/${VERSION}/${FILENAME}"
          tar -xzf ${FILENAME}
          mv sing-box-*-${ARCH}/sing-box ./sing-box
          chmod +x ./sing-box
          echo "$(pwd)" >> $GITHUB_PATH

      - name: Run GENERATOR.py
        run: python GENERATOR.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add subscription_RUS.txt subscription_RUS_base64.txt subscription_OTHER.txt subscription_OTHER_base64.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update subscription files"
            git pull --rebase origin main
            git push
          fi
