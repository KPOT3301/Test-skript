name: Check Vless Servers

on:
  schedule:
    - cron: '0 19 * * *'   # 19:00 UTC = 00:00 Оренбург (UTC+5)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Xray and GeoIP
        id: cache-xray-geoip
        uses: actions/cache@v3
        with:
          path: |
            xray-core
            GeoLite2-City.mmdb
          key: ${{ runner.os }}-xray-geoip-${{ hashFiles('GENERATOR.py') }}
          restore-keys: |
            ${{ runner.os }}-xray-geoip-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install geoip2

      - name: Download Xray-core (if not cached)
        if: steps.cache-xray-geoip.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray-core
          chmod +x xray-core/xray

      - name: Add Xray to PATH
        run: echo "$(pwd)/xray-core" >> $GITHUB_PATH

      - name: Download GeoIP database (if not cached)
        if: steps.cache-xray-geoip.outputs.cache-hit != 'true'
        run: |
          wget -q https://raw.githubusercontent.com/P3TERX/GeoLite.mmdb/download/GeoLite2-City.mmdb

      - name: Run GENERATOR.py
        run: python GENERATOR.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add subscription.txt subscription_base64.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update subscription files"
            git pull --rebase origin main
            git push
          fi
